global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'flask-instances'
    static_configs:
      - targets: ['web1:5000', 'web2:5000']   # 对应你 compose 里的容器名
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']       # 需要 compose 里加这个服务
