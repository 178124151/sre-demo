apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sre-demo-slo
  namespace: sre-demo
  labels:
    app.kubernetes.io/part-of: sre-demo
spec:
  groups:
    - name: sre-demo.slo
      rules:
        - alert: SreDemoHighErrorRate
          expr: |
            sum(rate(flask_http_request_total{status=~"5.."}[5m]))
            /
            sum(rate(flask_http_request_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "sre-demo error rate is above 5%"
            runbook_url: "runbooks/high-error-rate.md"

        - alert: SreDemoHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "sre-demo p99 latency is above 1s"
            runbook_url: "runbooks/high-latency.md"
