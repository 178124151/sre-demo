apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-demo-web
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: 30m
              memory: 80Mi
            limits:
              cpu: 200m
              memory: 192Mi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  template:
    spec:
      containers:
        - name: mysql
          resources:
            requests:
              cpu: 80m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-demo-nginx
spec:
  template:
    spec:
      containers:
        - name: nginx
          resources:
            requests:
              cpu: 20m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 96Mi
