apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sre-demo

resources:
  - namespace.yaml
  - app-config.yaml
  - app-secret.example.yaml
  - mysql.yaml
  - web.yaml
  - nginx.yaml
  - pdb.yaml

configMapGenerator:
  - name: nginx-config
    files:
      - nginx.conf=nginx.conf

generatorOptions:
  disableNameSuffixHash: true
